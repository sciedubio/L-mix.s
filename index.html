<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="빛과 색의 마술사">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233b82f6%22/></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233b82f6%22/></svg>">
    <title>빛의 합성 시뮬레이션</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-color: #3b82f6; /* Blue */
            --accent-color: #ec4899; /* Pink */
            --bg-color: #0f172a; /* Slate 900 */
            --text-color: #f8fafc; /* Slate 50 */
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .blend-screen {
            mix-blend-mode: screen;
        }
        
        /* Custom range sliders */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
            height: 30px; /* 마우스 클릭 인식 영역(Hitbox) 대폭 확대 */
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 26px;
            width: 26px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.15); /* 마우스로 잡았을 때 살짝 커지는 피드백 */
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px; /* 트랙(선) 두께 약간 확대 */
            cursor: pointer;
            border-radius: 3px;
        }
        #slider-r::-webkit-slider-runnable-track { background: linear-gradient(to right, #4a0000, #ff0000); }
        #slider-g::-webkit-slider-runnable-track { background: linear-gradient(to right, #004a00, #00ff00); }
        #slider-b::-webkit-slider-runnable-track { background: linear-gradient(to right, #00004a, #0000ff); }
        
        /* Firefox 브라우저 완벽 지원 추가 */
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            border-radius: 3px;
        }
        #slider-r::-moz-range-track { background: linear-gradient(to right, #4a0000, #ff0000); }
        #slider-g::-moz-range-track { background: linear-gradient(to right, #004a00, #00ff00); }
        #slider-b::-moz-range-track { background: linear-gradient(to right, #00004a, #0000ff); }
        
        input[type=range]::-moz-range-thumb {
            height: 26px;
            width: 26px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            border: none;
            transition: transform 0.1s;
        }
        input[type=range]::-moz-range-thumb:active {
            transform: scale(1.15);
        }
        
        .btn-active {
            transition: transform 0.15s ease, background-color 0.2s ease;
        }
        .btn-active:active {
            transform: scale(0.95);
        }
        
        @keyframes dash {
            to { stroke-dashoffset: -10; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Configuration ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeOWu_SdkZ9VfNm0rDt0QwOegE3HgW2fGdeABQTDQOM1YInR8gPBcvEBTdjIy_dn0/exec"; // 교사가 입력할 URL

        const QUIZ_POOL = [
            { q: "우리가 책을 볼 수 있는 것은 책이 스스로 빛을 내기 때문이다.", a: false, explain: "책은 스스로 빛을 내지 못하는(비광원) 물체이며, 광원의 빛을 '반사'하여 우리 눈에 들어오기 때문에 볼 수 있습니다." },
            { q: "빨간색 사과는 햇빛(백색광) 중 빨간색 빛을 반사하기 때문에 빨갛게 보인다.", a: true, explain: "불투명한 물체의 색은 그 물체가 '반사'하는 빛의 색으로 결정됩니다." },
            { q: "검은색 종이는 모든 빛을 반사하여 우리 눈에 들어오기 때문에 검게 보인다.", a: false, explain: "검은색 물체는 빛을 모두 '흡수'하여 반사하는 빛이 없기 때문에 검게 보입니다." },
            { q: "빛의 삼원색은 빨강(Red), 초록(Green), 파랑(Blue)이다.", a: true, explain: "빛의 삼원색인 RGB를 다양하게 조합하여 모든 색을 만들 수 있습니다." },
            { q: "스마트폰 화면에서 노란색을 표현할 때, 실제로는 빨간색과 파란색 화소가 켜진다.", a: false, explain: "노란색(Yellow) 빛은 빨간색(Red)과 초록색(Green) 빛이 합성되어 만들어집니다." },
            { q: "빛의 삼원색(RGB)을 모두 같은 비율로 합치면 검은색이 된다.", a: false, explain: "빛은 합칠수록 밝아지며, RGB를 모두 합치면 흰색(백색광)이 됩니다." },
            { q: "빨간색 조명 아래에서 초록색 나뭇잎을 보면 검은색으로 보인다.", a: true, explain: "초록색 나뭇잎은 초록빛만 반사하고 나머지는 흡수합니다. 빨간빛만 비추면 모두 흡수해버려 반사할 빛이 없으므로 검게 보입니다." },
            { q: "영상 장치는 빛의 합성을 이용하여 세 가지 색의 화소만으로 수많은 색을 만들어낸다.", a: true, explain: "화면의 미세한 RGB 화소들의 밝기를 각각 조절하여 다양한 색을 합성해냅니다." },
            { q: "빨간색 조명 아래에서 빨간색 장미꽃은 빨간색 빛을 흡수하여 어둡게 보인다.", a: false, explain: "빨간색 장미꽃은 빨간빛을 '반사'하므로, 빨간 조명 아래에서는 더욱 선명한 빨간색으로 보입니다." },
            { q: "점묘화는 멀리서 볼 때 우리 눈(망막)에서 원색의 빛들이 섞여 보이는 원리를 이용한 것이다.", a: true, explain: "물감을 섞지 않고 점을 찍어 빛의 합성(병치 혼합) 효과를 내는 것이 점묘법의 원리입니다." }
        ];

        // --- Icons (Inline SVG) ---
        const IconLightbulb = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconCamera = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;

        // --- Main App Component ---
        const App = () => {
            // State
            const [view, setView] = useState('intro');
            const [isGuideOpen, setIsGuideOpen] = useState(false);
            const [alertData, setAlertData] = useState(null); // { message: string }
            
            // Simulation State
            const [r, setR] = useState(255);
            const [g, setG] = useState(255);
            const [b, setB] = useState(255);
            const [targetObj, setTargetObj] = useState('banana'); // 'banana', 'screen', 'white', 'camera'
            
            // Camera AR State (수행평가 앱 내 카메라 복구)
            const videoRef = useRef(null);
            const [cameraStream, setCameraStream] = useState(null);
            const [cameraError, setCameraError] = useState('');

            // Stats State
            const [stats, setStats] = useState({
                minBrightness: 100, // percentage
                maxBrightness: 100, // percentage
                mixCount: 0
            });

            // Report State
            const [formData, setFormData] = useState({ 
                studentId: '', studentName: '', 
                q1_1_light: '', q1_1_nonlight: '', q1_2: '',
                q2_1_yellow: '', q2_1_white: '', q2_2: '',
                q3_1: '', q3_2_choice: 'A', q3_2_answer: ''
            });
            const [quizzes, setQuizzes] = useState([]);
            const [quizAnswers, setQuizAnswers] = useState({}); // { index: boolean }
            const [isSubmitting, setIsSubmitting] = useState(false);

            // Helpers
            const showAlert = (message) => setAlertData({ message });
            const closeAlert = () => setAlertData(null);

            // Effect: Shuffle quizzes on mount
            useEffect(() => {
                const shuffled = [...QUIZ_POOL].sort(() => 0.5 - Math.random());
                setQuizzes(shuffled.slice(0, 3));
            }, [view === 'intro']); // Reset when going back to intro

            // Effect: Track stats when RGB changes
            useEffect(() => {
                if (view !== 'simulation') return;
                const brightness = Math.round(((r + g + b) / (255 * 3)) * 100);
                setStats(prev => ({
                    minBrightness: Math.min(prev.minBrightness, brightness),
                    maxBrightness: Math.max(prev.maxBrightness, brightness),
                    mixCount: prev.mixCount + 1
                }));
            }, [r, g, b, view]);

            // Effect: Handle Camera Lifecycle
            useEffect(() => {
                const stopCamera = () => {
                    if (cameraStream) {
                        cameraStream.getTracks().forEach(track => track.stop());
                        setCameraStream(null);
                    }
                };

                const startCamera = async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: { ideal: 'environment' } } 
                        });
                        setCameraStream(stream);
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            videoRef.current.onloadedmetadata = () => {
                                videoRef.current.play().catch(e => console.warn(e));
                            };
                        }
                        setCameraError('');
                    } catch (err) {
                        try {
                            const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                            setCameraStream(fallbackStream);
                            if (videoRef.current) {
                                videoRef.current.srcObject = fallbackStream;
                                videoRef.current.onloadedmetadata = () => {
                                    videoRef.current.play().catch(e => console.warn(e));
                                };
                            }
                            setCameraError('');
                        } catch (fallbackErr) {
                            setCameraError('카메라 접근 권한을 허용해주세요.');
                            setTimeout(() => setTargetObj('banana'), 2000); // 권한 없으면 2초 후 기본 화면 복귀
                        }
                    }
                };

                if (targetObj === 'camera' && view === 'simulation') {
                    startCamera();
                } else {
                    stopCamera();
                }

                return () => stopCamera();
            }, [targetObj, view]);

            const handleReset = () => {
                setR(255); setG(255); setB(255);
                setTargetObj('banana');
                setStats({ minBrightness: 100, maxBrightness: 100, mixCount: 0 });
            };

            const submitData = async () => {
                const { studentId, studentName, q1_1_light, q1_1_nonlight, q1_2, q2_1_yellow, q2_1_white, q2_2, q3_1, q3_2_answer } = formData;
                if (!studentId.trim() || !studentName.trim() || !q1_1_light.trim() || !q1_1_nonlight.trim() || !q1_2.trim() || !q2_1_yellow.trim() || !q2_1_white.trim() || !q2_2.trim() || !q3_1.trim() || !q3_2_answer.trim()) {
                    showAlert("학번, 이름 및 모든 탐구 질문에 대한 답안을 입력해주세요.");
                    return;
                }
                if (Object.keys(quizAnswers).length < 3) {
                    showAlert("모든 OX 퀴즈를 풀어주세요.");
                    return;
                }
                if (!GOOGLE_SCRIPT_URL) {
                    showAlert("DB 연동 가이드를 참고하여 GOOGLE_SCRIPT_URL을 설정해주세요.");
                    return;
                }

                setIsSubmitting(true);
                
                // Calculate Score
                let score = 0;
                quizzes.forEach((q, idx) => {
                    if (quizAnswers[idx] === q.a) score++;
                });

                const payload = {
                    timestamp: new Date().toISOString(),
                    studentId: formData.studentId,
                    studentName: formData.studentName,
                    q1_1_light: formData.q1_1_light,
                    q1_1_nonlight: formData.q1_1_nonlight,
                    q1_2: formData.q1_2,
                    q2_1_yellow: formData.q2_1_yellow,
                    q2_1_white: formData.q2_1_white,
                    q2_2: formData.q2_2,
                    q3_1: formData.q3_1,
                    q3_2_choice: formData.q3_2_choice,
                    q3_2_answer: formData.q3_2_answer,
                    minValue: stats.minBrightness + "%",
                    maxValue: stats.maxBrightness + "%",
                    mixCount: stats.mixCount,
                    quizScore: score
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(payload)
                    });
                    
                    // no-cors doesn't return readable response, assume success after timeout
                    setTimeout(() => {
                        setIsSubmitting(false);
                        setView('done');
                    }, 1500);
                } catch (error) {
                    setIsSubmitting(false);
                    showAlert("제출 중 오류가 발생했습니다. 인터넷 연결을 확인해주세요.");
                }
            };

            // --- Sub-components ---
            
            const Header = () => (
                <header className="flex justify-between items-center p-4 border-b border-white/10">
                    <h1 className="text-xl font-bold flex items-center gap-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-pink-400">
                        <IconLightbulb /> 빛과 색의 마술사
                    </h1>
                    <button 
                        onClick={() => setIsGuideOpen(true)}
                        className="btn-active flex items-center gap-1 text-xs bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full"
                    >
                        <IconSettings /> DB 연동 가이드
                    </button>
                </header>
            );

            // View 1: Intro
            const IntroView = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] p-6 text-center">
                    <div className="w-32 h-32 mb-8 relative">
                        <div className="absolute inset-0 bg-red-500 rounded-full mix-blend-screen translate-x-[-15%] translate-y-[15%] opacity-80 blur-md animate-pulse"></div>
                        <div className="absolute inset-0 bg-green-500 rounded-full mix-blend-screen translate-x-[15%] translate-y-[15%] opacity-80 blur-md animate-pulse" style={{animationDelay: '0.5s'}}></div>
                        <div className="absolute inset-0 bg-blue-500 rounded-full mix-blend-screen translate-y-[-15%] opacity-80 blur-md animate-pulse" style={{animationDelay: '1s'}}></div>
                        <svg className="absolute inset-0 w-full h-full text-white drop-shadow-2xl z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </div>
                    <h2 className="text-3xl md:text-5xl font-black mb-4">빛의 합성과 색의 원리</h2>
                    <p className="text-gray-300 max-w-lg mb-8 leading-relaxed">
                        우리가 물체를 보고 다양한 색을 인식하는 원리는 무엇일까요?<br/>
                        조명에 따라 물체의 색이 어떻게 변하는지, 영상 장치는 어떻게 색을 만들어내는지 직접 시뮬레이션으로 탐구해봅시다.
                    </p>
                    <button 
                        onClick={() => setView('simulation')}
                        className="btn-active bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-blue-500/30 text-lg"
                    >
                        실험 시작하기
                    </button>
                    <div className="mt-auto pt-16 text-xs text-gray-500">Created by Yang DH</div>
                </div>
            );

            // View 2: Simulation
            const SimulationView = () => {
                // Calculate resulting colors for visualization
                const mixedColor = `rgb(${r}, ${g}, ${b})`;
                
                // Object color logic (Reflection/Absorption)
                let objRed = 0; let objGreen = 0; let objBlue = 0;

                if (targetObj === 'banana') {
                    // 노란색 바나나는 빨강과 초록을 반사
                    objRed = r; objGreen = g; objBlue = 0;
                } else if (targetObj === 'screen') {
                    // 초록색 스크린은 초록만 반사
                    objRed = 0; objGreen = g; objBlue = 0;
                } else if (targetObj === 'white') {
                    // 흰 종이는 모든 빛 반사
                    objRed = r; objGreen = g; objBlue = b;
                }

                return (
                    <div className="p-4 md:p-6 max-w-6xl mx-auto flex flex-col min-h-[calc(100vh-70px)]">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
                            
                            {/* Controls Panel */}
                            <div className="lg:col-span-4 flex flex-col gap-4">
                                <div className="glass-panel p-5 rounded-2xl">
                                    <h3 className="font-bold mb-4 flex items-center gap-2"><IconLightbulb/> 광원 조절 (빛의 삼원색)</h3>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <div className="flex justify-between text-sm mb-1 text-red-400 font-bold">
                                                <span>Red (빨강)</span><span>{r}</span>
                                            </div>
                                            <input type="range" id="slider-r" min="0" max="255" value={r} onChange={e => setR(Number(e.target.value))} />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm mb-1 text-green-400 font-bold">
                                                <span>Green (초록)</span><span>{g}</span>
                                            </div>
                                            <input type="range" id="slider-g" min="0" max="255" value={g} onChange={e => setG(Number(e.target.value))} />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm mb-1 text-blue-400 font-bold">
                                                <span>Blue (파랑)</span><span>{b}</span>
                                            </div>
                                            <input type="range" id="slider-b" min="0" max="255" value={b} onChange={e => setB(Number(e.target.value))} />
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 pt-4 border-t border-white/10">
                                        <div className="text-sm text-gray-400 mb-2">현재 조명 밝기 (합산)</div>
                                        <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-gradient-to-r from-gray-500 to-white transition-all duration-300" style={{width: `${((r+g+b)/(255*3))*100}%`}}></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass-panel p-5 rounded-2xl">
                                    <h3 className="font-bold mb-4">관찰 대상 선택</h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                        <button onClick={() => setTargetObj('banana')} className={`btn-active p-2 rounded-lg text-sm border ${targetObj === 'banana' ? 'border-yellow-500 bg-yellow-500/20' : 'border-white/10 bg-white/5'}`}>노란 바나나</button>
                                        <button onClick={() => setTargetObj('screen')} className={`btn-active p-2 rounded-lg text-sm border ${targetObj === 'screen' ? 'border-green-500 bg-green-500/20' : 'border-white/10 bg-white/5'}`}>초록 스크린</button>
                                        <button onClick={() => setTargetObj('white')} className={`btn-active p-2 rounded-lg text-sm border ${targetObj === 'white' ? 'border-blue-500 bg-blue-500/20' : 'border-white/10 bg-white/5'}`}>흰색 종이</button>
                                        <button onClick={() => setTargetObj('camera')} className={`btn-active flex flex-col items-center justify-center p-2 rounded-lg text-sm border font-bold ${targetObj === 'camera' ? 'border-purple-500 bg-purple-500/30' : 'border-purple-500/50 bg-purple-500/10 text-purple-200'}`}>
                                            <IconCamera /> AR 카메라
                                        </button>
                                    </div>

                                    <h3 className="font-bold mt-6 mb-3 text-sm text-yellow-300">수행평가 미션 (빠른 설정)</h3>
                                    <div className="flex flex-wrap gap-2">
                                        <button onClick={() => {setTargetObj('banana'); setR(255); setG(255); setB(255);}} className="btn-active px-3 py-1.5 rounded-md text-xs bg-white/10 hover:bg-white/20">백색광 + 노란 바나나</button>
                                        <button onClick={() => {setTargetObj('white'); setR(255); setG(255); setB(0);}} className="btn-active px-3 py-1.5 rounded-md text-xs bg-yellow-500/20 hover:bg-yellow-500/40 text-yellow-200">노란색 화면 (화소 관찰)</button>
                                        <button onClick={() => {setTargetObj('camera'); setR(255); setG(0); setB(0);}} className="btn-active px-3 py-1.5 rounded-md text-xs bg-red-500/20 hover:bg-red-500/40 text-red-200">빨간 조명 + 실제 카메라(AR)</button>
                                        <button onClick={() => {setTargetObj('camera'); setR(0); setG(255); setB(0);}} className="btn-active px-3 py-1.5 rounded-md text-xs bg-green-500/20 hover:bg-green-500/40 text-green-200">초록 조명 + 실제 카메라(AR)</button>
                                    </div>

                                    <div className="mt-4 text-xs text-gray-400 leading-relaxed bg-black/30 p-3 rounded-lg">
                                        <p>💡 <b>도움말:</b> 물체의 색은 물체가 반사하는 빛의 색으로 결정됩니다. 조명 색을 바꾸며 관찰 대상이 어떻게 보이는지 확인해보세요.</p>
                                    </div>
                                </div>
                            </div>

                            {/* Visualization Panel */}
                            <div className="lg:col-span-8 flex flex-col gap-4">
                                <div className="glass-panel rounded-2xl overflow-hidden flex-grow relative bg-black flex flex-col">
                                    
                                    {/* Top: Light Beam Synthesis */}
                                    <div className="flex-1 border-b border-white/10 flex items-center justify-center p-4 relative min-h-[250px]">
                                        <div className="absolute top-2 left-4 text-xs text-gray-500 font-bold z-10">[빛의 합성 결과] 벽면</div>
                                        <div className="relative w-48 h-48 sm:w-64 sm:h-64 flex items-center justify-center">
                                            {/* Red Beam */}
                                            <div className="absolute w-3/4 h-3/4 rounded-full blend-screen transform -translate-y-1/4 transition-colors duration-200" style={{ backgroundColor: `rgb(${r},0,0)` }}></div>
                                            {/* Green Beam */}
                                            <div className="absolute w-3/4 h-3/4 rounded-full blend-screen transform translate-x-1/4 translate-y-1/4 transition-colors duration-200" style={{ backgroundColor: `rgb(0,${g},0)` }}></div>
                                            {/* Blue Beam */}
                                            <div className="absolute w-3/4 h-3/4 rounded-full blend-screen transform -translate-x-1/4 translate-y-1/4 transition-colors duration-200" style={{ backgroundColor: `rgb(0,0,${b})` }}></div>
                                        </div>
                                    </div>

                                    {/* Bottom Grid: Object & Pixels */}
                                    <div className="flex-1 flex flex-col sm:flex-row min-h-[200px]">
                                        
                                        {/* Object View */}
                                        <div className="flex-1 p-4 border-r border-white/10 relative flex items-center justify-center overflow-hidden">
                                            <div className="absolute top-2 left-4 text-xs text-gray-500 font-bold z-10 drop-shadow-md">
                                                {targetObj === 'camera' ? '[AR 조명] 실제 물체 관찰' : '[반사/흡수] 조명 아래 관찰'}
                                            </div>
                                            
                                            {/* Light Source to Object Path (Hide in Camera Mode) */}
                                            {targetObj !== 'camera' && (
                                                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-60">
                                                    {(r>0 || g>0 || b>0) && (
                                                        <>
                                                            <path d="M 0,20 Q 30,50 45,50" fill="none" stroke={mixedColor} strokeWidth="2" strokeDasharray="4,4" className="animate-[dash_1s_linear_infinite]" />
                                                            <polygon points="45,50 40,48 40,52" fill={mixedColor} />
                                                        </>
                                                    )}
                                                    {(objRed>0 || objGreen>0 || objBlue>0) && (
                                                        <>
                                                            <path d="M 60,50 Q 80,50 95,50" fill="none" stroke={`rgb(${objRed}, ${objGreen}, ${objBlue})`} strokeWidth="2" strokeDasharray="4,4" className="animate-[dash_1s_linear_infinite]" />
                                                            <polygon points="95,50 90,48 90,52" fill={`rgb(${objRed}, ${objGreen}, ${objBlue})`} />
                                                        </>
                                                    )}
                                                </svg>
                                            )}

                                            {/* Eye Icon (Hide in Camera Mode) */}
                                            {targetObj !== 'camera' && (
                                                <div className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 flex flex-col items-center z-10">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                                    <span className="text-[10px] mt-1 font-bold">우리 눈</span>
                                                </div>
                                            )}

                                            <div className={`relative z-10 flex justify-center items-center h-full w-full ${targetObj !== 'camera' ? 'mr-12' : ''}`} style={{ isolation: 'isolate' }}>
                                                {targetObj === 'banana' && (
                                                    <svg viewBox="0 0 100 100" className="w-32 h-32 drop-shadow-2xl transition-colors duration-200">
                                                        {/* Banana body */}
                                                        <path d="M 20,80 C 40,100 80,85 85,30 C 65,65 35,70 20,80 Z" fill={`rgb(${objRed},${objGreen},${objBlue})`} stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>
                                                        {/* Banana Ridge (line along the middle) */}
                                                        <path d="M 23,78 C 40,92 72,78 82,35" fill="none" stroke="rgba(0,0,0,0.15)" strokeWidth="1.5" />
                                                        {/* Stem (Top) */}
                                                        <path d="M 85,30 L 88,20 L 93,22 L 87,32 Z" fill="#4a3f35" />
                                                        {/* Tip (Bottom) */}
                                                        <path d="M 20,80 L 16,83 L 19,85 Z" fill="#4a3f35" />
                                                    </svg>
                                                )}
                                                {targetObj === 'screen' && (
                                                    <div className="w-28 h-20 shadow-2xl transition-colors duration-200 border-4 border-gray-700 rounded-md flex items-center justify-center text-black/50 text-xs font-bold" style={{ backgroundColor: `rgb(${objRed},${objGreen},${objBlue})` }}>
                                                        스크린
                                                    </div>
                                                )}
                                                {targetObj === 'white' && (
                                                    <div className="w-24 h-32 shadow-2xl transition-colors duration-200 border border-white/20 flex items-center justify-center text-black/50 text-xs font-bold" style={{ backgroundColor: mixedColor, transform: 'rotate(-5deg)' }}>
                                                        {r>150 && g>150 && b>150 ? '흰 종이' : '빛 반사 중'}
                                                    </div>
                                                )}
                                                {targetObj === 'camera' && (
                                                    <div className="relative w-full h-full max-h-[200px] flex items-center justify-center bg-gray-900 rounded-lg overflow-hidden border border-white/20">
                                                        {cameraError ? (
                                                            <div className="text-red-400 text-xs p-4 text-center font-bold whitespace-pre-wrap">{cameraError}</div>
                                                        ) : (
                                                            <>
                                                                <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover" style={{ transform: 'translateZ(0)' }} />
                                                                {/* AR Virtual Light Filter */}
                                                                <div className="absolute inset-0 pointer-events-none transition-colors duration-200" style={{
                                                                    backgroundColor: `rgb(${r},${g},${b})`,
                                                                    mixBlendMode: 'multiply',
                                                                    transform: 'translateZ(0)'
                                                                }}></div>
                                                            </>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* Pixel Macro View */}
                                        <div className="flex-1 p-4 relative flex flex-col items-center justify-center overflow-hidden">
                                            <div className="absolute top-2 left-4 text-xs text-gray-500 font-bold z-10">[영상 장치] 화소(Pixel) 확대경</div>
                                            
                                            <div className="relative border-4 border-gray-800 rounded-full p-2 bg-black shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                                                {/* Magnifying glass handle */}
                                                <div className="absolute -bottom-10 -right-10 w-2 h-16 bg-gray-600 rotate-45 rounded"></div>
                                                
                                                {/* Pixel grid */}
                                                <div className="grid grid-cols-3 gap-1 p-2 w-24 h-24">
                                                    {Array(3).fill(0).map((_, i) => (
                                                        <React.Fragment key={i}>
                                                            <div className="rounded-sm transition-opacity duration-200" style={{ backgroundColor: 'red', opacity: r/255 }}></div>
                                                            <div className="rounded-sm transition-opacity duration-200" style={{ backgroundColor: 'lime', opacity: g/255 }}></div>
                                                            <div className="rounded-sm transition-opacity duration-200" style={{ backgroundColor: 'blue', opacity: b/255 }}></div>
                                                        </React.Fragment>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Bottom Actions */}
                        <div className="mt-4 flex justify-between items-center gap-4">
                            <button onClick={handleReset} className="btn-active px-6 py-3 rounded-xl bg-white/10 hover:bg-white/20 text-sm font-bold">
                                초기화
                            </button>
                            <button onClick={() => setView('report')} className="btn-active flex-1 max-w-xs px-6 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold text-lg shadow-lg">
                                결과 보고서 작성
                            </button>
                        </div>
                    </div>
                );
            };

            // View 3: Report
            const ReportView = () => (
                <div className="p-4 md:p-6 max-w-3xl mx-auto min-h-[calc(100vh-70px)] flex flex-col">
                    <h2 className="text-2xl font-black mb-6 text-center">탐구 결과 보고서</h2>
                    
                    <div className="glass-panel rounded-2xl p-6 mb-6">
                        <h3 className="text-sm text-gray-400 mb-4 border-b border-white/10 pb-2">실험 데이터 요약</h3>
                        <div className="flex justify-around text-center mb-6">
                            <div>
                                <div className="text-xs text-gray-500">생성된 빛 색상 수</div>
                                <div className="text-xl font-bold text-blue-400">{stats.mixCount}회 이상</div>
                            </div>
                            <div>
                                <div className="text-xs text-gray-500">최대 밝기 도달률</div>
                                <div className="text-xl font-bold text-pink-400">{stats.maxBrightness}%</div>
                            </div>
                        </div>

                        <div className="space-y-4">
                            <div className="flex gap-4">
                                <input 
                                    type="text" placeholder="학번 (예: 2101)" 
                                    className="flex-1 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 transition-colors"
                                    value={formData.studentId} onChange={e => setFormData({...formData, studentId: e.target.value})}
                                />
                                <input 
                                    type="text" placeholder="이름" 
                                    className="flex-1 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 transition-colors"
                                    value={formData.studentName} onChange={e => setFormData({...formData, studentName: e.target.value})}
                                />
                            </div>
                            
                            {/* 수행평가 문항 폼 */}
                            <div className="mt-8 space-y-6">
                                <div className="bg-black/20 p-5 rounded-xl border border-white/10">
                                    <h4 className="font-bold text-blue-400 mb-4">탐구 1. 물체를 보는 원리와 색의 결정</h4>
                                    <div className="space-y-4 text-sm">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block mb-2 text-gray-300">1-1. 화면(광원)을 볼 때의 빛의 경로 및 원리</label>
                                                <textarea 
                                                    placeholder="화살표(-{'>'}) 기호를 이용해 빛의 경로를 순서대로 적고, 그렇게 보이는 원리를 설명해주세요.&#13;&#10;(예: A -> B)" 
                                                    className="w-full h-24 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 resize-none" 
                                                    value={formData.q1_1_light} 
                                                    onChange={e => setFormData({...formData, q1_1_light: e.target.value})}>
                                                </textarea>
                                            </div>
                                            <div>
                                                <label className="block mb-2 text-gray-300">1-1. 테두리(베젤)를 볼 때의 빛의 경로 및 원리</label>
                                                <textarea 
                                                    placeholder="화살표(-{'>'}) 기호를 이용해 빛의 경로를 순서대로 적고, 그렇게 보이는 원리를 설명해주세요.&#13;&#10;(예: A -> B -> C)" 
                                                    className="w-full h-24 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 resize-none" 
                                                    value={formData.q1_1_nonlight} 
                                                    onChange={e => setFormData({...formData, q1_1_nonlight: e.target.value})}>
                                                </textarea>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block mb-2 text-gray-300">1-2. 백색광 아래 노란색 바나나가 노랗게 보이는 까닭 (물체, 빛, 흡수, 반사 포함)</label>
                                            <textarea 
                                                placeholder="주어진 4가지 과학 용어를 모두 사용하여 서술형으로 작성하세요."
                                                className="w-full h-20 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 resize-none" 
                                                value={formData.q1_2} 
                                                onChange={e => setFormData({...formData, q1_2: e.target.value})}>
                                            </textarea>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-black/20 p-5 rounded-xl border border-white/10">
                                    <h4 className="font-bold text-green-400 mb-4">탐구 2. 빛의 합성과 영상 장치의 원리</h4>
                                    <div className="space-y-4 text-sm">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block mb-2 text-gray-300">2-1. 노란색 화면 화소 관찰 결과</label>
                                                <input type="text" className="w-full bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500" value={formData.q2_1_yellow} onChange={e => setFormData({...formData, q2_1_yellow: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block mb-2 text-gray-300">2-1. 흰색 화면 화소 관찰 결과</label>
                                                <input type="text" className="w-full bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500" value={formData.q2_1_white} onChange={e => setFormData({...formData, q2_1_white: e.target.value})} />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block mb-2 text-gray-300">2-2. 영상 장치의 색 표현 원리 (빛의 합성 개념 사용)</label>
                                            <textarea className="w-full h-20 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 resize-none" value={formData.q2_2} onChange={e => setFormData({...formData, q2_2: e.target.value})}></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-black/20 p-5 rounded-xl border border-white/10">
                                    <h4 className="font-bold text-pink-400 mb-4">탐구 3. [논술] 조명에 따른 색 변화와 실생활 적용</h4>
                                    <div className="space-y-4 text-sm">
                                        <div>
                                            <label className="block mb-2 text-gray-300">3-1. 빨간색 조명 아래 초록색 스크린이 검은색으로 보이는 이유 (반사, 흡수 원리)</label>
                                            <textarea className="w-full h-20 bg-black/30 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 resize-none" value={formData.q3_1} onChange={e => setFormData({...formData, q3_1: e.target.value})}></textarea>
                                        </div>
                                        
                                        <div className="p-4 border border-white/10 rounded-lg bg-black/30">
                                            <label className="block mb-3 text-gray-300 font-bold">3-2. 논술 문제 선택</label>
                                            <div className="flex gap-4 mb-4">
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="radio" name="q3_2_choice" value="A" checked={formData.q3_2_choice === 'A'} onChange={() => setFormData({...formData, q3_2_choice: 'A'})} className="accent-pink-500 w-4 h-4" />
                                                    <span>[선택 A] 점묘법의 원리 (빛의 합성)</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="radio" name="q3_2_choice" value="B" checked={formData.q3_2_choice === 'B'} onChange={() => setFormData({...formData, q3_2_choice: 'B'})} className="accent-pink-500 w-4 h-4" />
                                                    <span>[선택 B] 조명에 따른 옷 색깔 예측 (빛의 반사)</span>
                                                </label>
                                            </div>
                                            <div className="text-sm md:text-base text-blue-200 font-medium mb-4 bg-blue-900/30 p-4 rounded-lg border border-blue-500/30 leading-relaxed shadow-inner">
                                                {formData.q3_2_choice === 'A' ? "▶ A 문제: 물감을 섞지 않고 원색의 점을 찍었음에도 밝고 다양한 색으로 보이는 원리를 서술하시오." : "▶ B 문제: 빨강, 초록 조명에서 각각 빨강, 검정으로 보이는 옷에 햇빛을 비추면 무슨 색으로 보일지 예측하고 이유를 서술하시오."}
                                            </div>
                                            <textarea placeholder="선택한 문제에 대한 논술 답안을 작성하세요." className="w-full h-24 bg-black/50 border border-white/20 rounded-lg p-3 outline-none focus:border-blue-500 resize-none" value={formData.q3_2_answer} onChange={e => setFormData({...formData, q3_2_answer: e.target.value})}></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="glass-panel rounded-2xl p-6 mb-6 flex-grow">
                        <h3 className="text-sm text-gray-400 mb-4 border-b border-white/10 pb-2">개념 확인 OX 퀴즈 (랜덤 3문항)</h3>
                        <div className="space-y-6">
                            {quizzes.map((q, idx) => (
                                <div key={idx} className="bg-black/20 p-4 rounded-xl">
                                    <p className="font-medium mb-3">Q{idx+1}. {q.q}</p>
                                    <div className="flex gap-4 mb-3">
                                        <button 
                                            onClick={() => setQuizAnswers({...quizAnswers, [idx]: true})}
                                            className={`btn-active flex-1 py-2 rounded-lg font-bold text-lg border ${quizAnswers[idx] === true ? 'bg-blue-500 border-blue-400' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}
                                        >O</button>
                                        <button 
                                            onClick={() => setQuizAnswers({...quizAnswers, [idx]: false})}
                                            className={`btn-active flex-1 py-2 rounded-lg font-bold text-lg border ${quizAnswers[idx] === false ? 'bg-pink-600 border-pink-400' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}
                                        >X</button>
                                    </div>
                                    {quizAnswers[idx] !== undefined && (
                                        <div className={`text-sm p-3 rounded-lg ${quizAnswers[idx] === q.a ? 'bg-green-500/20 text-green-300' : 'bg-red-500/20 text-red-300'}`}>
                                            <b>{quizAnswers[idx] === q.a ? '정답입니다!' : '오답입니다.'}</b> {q.explain}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="flex gap-4 mt-auto">
                        <button onClick={() => setView('simulation')} className="btn-active px-6 py-3 rounded-xl bg-white/10 hover:bg-white/20 text-sm font-bold">
                            다시 실험하기
                        </button>
                        <button 
                            onClick={submitData} 
                            disabled={isSubmitting}
                            className="btn-active flex-1 flex justify-center items-center gap-2 px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg shadow-lg disabled:opacity-50"
                        >
                            {isSubmitting ? (
                                <><svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 전송 중...</>
                            ) : '결과 제출하기'}
                        </button>
                    </div>
                </div>
            );

            // View 4: Done
            const DoneView = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] p-6 text-center">
                    <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(16,185,129,0.5)]">
                        <IconCheck />
                    </div>
                    <h2 className="text-3xl font-black mb-4">제출이 완료되었습니다!</h2>
                    <p className="text-gray-300 mb-8 max-w-md">
                        수행평가 대비 탐구 활동을 훌륭하게 수행했습니다.<br/>
                        작성한 내용은 구글 스프레드시트에 안전하게 저장되었습니다.
                    </p>
                    <div className="glass-panel p-6 rounded-2xl mb-8 text-left w-full max-w-sm">
                        <div className="text-sm text-gray-400 mb-1">학번 / 이름</div>
                        <div className="font-bold text-lg mb-4">{formData.studentId} {formData.studentName}</div>
                        <div className="text-sm text-gray-400 mb-1">퀴즈 점수</div>
                        <div className="font-bold text-lg text-blue-400">
                            {quizzes.filter((q,i) => quizAnswers[i] === q.a).length} / 3 점
                        </div>
                    </div>
                    <button 
                        onClick={() => { handleReset(); setView('intro'); }}
                        className="btn-active bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-full border border-white/20"
                    >
                        처음으로 돌아가기
                    </button>
                </div>
            );

            // Modals
            const GuideModal = () => {
                if (!isGuideOpen) return null;
                const scriptCode = `function doPost(e) {
  try {
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    const data = JSON.parse(e.postData.contents);
    sheet.appendRow([
      new Date(),
      data.studentId || "",
      data.studentName || "",
      data.q1_1_light || "",
      data.q1_1_nonlight || "",
      data.q1_2 || "",
      data.q2_1_yellow || "",
      data.q2_1_white || "",
      data.q2_2 || "",
      data.q3_1 || "",
      data.q3_2_choice || "",
      data.q3_2_answer || "",
      data.mixCount ?? "",
      data.quizScore ?? ""
    ]);
    return ContentService.createTextOutput(JSON.stringify({result:"success"}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({result:"error", message: err.message}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;
                return (
                    <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex justify-center items-center p-4">
                        <div className="bg-slate-800 border border-white/20 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
                            <div className="p-4 border-b border-white/10 flex justify-between items-center bg-slate-800/80 rounded-t-2xl sticky top-0">
                                <h3 className="font-bold text-lg flex items-center gap-2"><IconSettings/> 교사용 DB 연동 가이드</h3>
                                <button onClick={() => setIsGuideOpen(false)} className="text-gray-400 hover:text-white p-2">✕</button>
                            </div>
                            <div className="p-6 overflow-y-auto space-y-6 text-sm text-gray-300">
                                <section>
                                    <h4 className="text-white font-bold mb-2 flex items-center gap-2">① 구글 시트 준비</h4>
                                    <p>새 구글 시트를 생성하고 1행에 다음 헤더를 정확히 입력합니다.<br/>
                                    <code className="bg-black/50 p-1 rounded text-pink-300 block mt-2 overflow-x-auto whitespace-nowrap">timestamp | studentId | studentName | q1_1_light | q1_1_nonlight | q1_2 | q2_1_yellow | q2_1_white | q2_2 | q3_1 | q3_2_choice | q3_2_answer | mixCount | quizScore</code></p>
                                </section>
                                <section>
                                    <h4 className="text-white font-bold mb-2">② Apps Script 작성</h4>
                                    <p className="mb-2">확장 프로그램 &gt; Apps Script로 이동하여 기존 코드를 지우고 아래 코드를 붙여넣습니다.</p>
                                    <div className="relative">
                                        <pre className="bg-black/50 p-4 rounded-lg overflow-x-auto text-xs text-green-300 font-mono leading-relaxed">{scriptCode}</pre>
                                    </div>
                                </section>
                                <section>
                                    <h4 className="text-white font-bold mb-2">③ 웹 앱 배포</h4>
                                    <ol className="list-decimal pl-5 space-y-1">
                                        <li>우측 상단 <b>[배포]</b> {' > '} <b>[새 배포]</b> 클릭</li>
                                        <li>유형 선택(톱니바퀴) {' > '} <b>웹 앱</b></li>
                                        <li>설명 입력 (예: 빛의합성)</li>
                                        <li>실행하는 사용자: <b>나</b></li>
                                        <li>액세스할 수 있는 사용자: <b>모든 사용자</b></li>
                                        li>배포 클릭 후 권한 검토 진행 (고급 {' > '} 이동)</li>
                                        <li>발급된 <b>웹 앱 URL</b>을 복사하여 이 HTML 소스 코드 최상단의 <code className="text-blue-300">GOOGLE_SCRIPT_URL</code> 값으로 붙여넣습니다.</li>
                                    </ol>
                                </section>
                                <section>
                                    <h4 className="text-white font-bold mb-2">④ 홈 화면에 추가 (PWA 앱처럼 사용)</h4>
                                    <ul className="list-disc pl-5 space-y-1">
                                        <li><b>iOS (Safari):</b> 하단 공유 아이콘(📤) {' > '} '홈 화면에 추가'</li>
                                        <li><b>Android (Chrome):</b> 우측 상단 메뉴(⋮) {' > '} '홈 화면에 추가'</li>
                                    </ul>
                                </section>
                            </div>
                            <div className="p-4 border-t border-white/10 text-center text-xs text-gray-500">
                                Created by Yang DH
                            </div>
                        </div>
                    </div>
                );
            };

            const AlertModal = () => {
                if (!alertData) return null;
                return (
                    <div className="fixed inset-0 z-[60] bg-black/50 flex justify-center items-center p-4 backdrop-blur-sm">
                        <div className="bg-slate-800 border border-white/20 rounded-2xl w-full max-w-sm p-6 text-center shadow-2xl animate-[bounce_0.3s_ease-out]">
                            <div className="text-yellow-400 mb-4 flex justify-center"><IconInfo /></div>
                            <p className="text-white mb-6 whitespace-pre-wrap">{alertData.message}</p>
                            <button onClick={closeAlert} className="btn-active w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-xl">
                                확인
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    {Header()}
                    <main className="flex-grow">
                        {view === 'intro' && IntroView()}
                        {view === 'simulation' && SimulationView()}
                        {view === 'report' && ReportView()}
                        {view === 'done' && DoneView()}
                    </main>
                    {GuideModal()}
                    {AlertModal()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
